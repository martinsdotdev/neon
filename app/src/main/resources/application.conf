pekko {
  actor {
    provider = cluster

    allow-java-serialization = off

    serializers {
      jackson-cbor = "org.apache.pekko.serialization.jackson.JacksonCborSerializer"
    }
    serialization-bindings {
      "neon.common.serialization.CborSerializable" = jackson-cbor
    }
  }

  serialization.jackson {
    jackson-modules += "com.fasterxml.jackson.module.scala.DefaultScalaModule"
  }

  remote.artery {
    canonical.hostname = "127.0.0.1"
    canonical.port = 25520
  }

  cluster {
    seed-nodes = ["pekko://neon-wes@127.0.0.1:25520"]
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    sharding {
      number-of-shards = 100
    }
  }

  persistence {
    journal.plugin = "pekko.persistence.r2dbc.journal"
    snapshot-store.plugin = "pekko.persistence.r2dbc.snapshot"
    state.plugin = "pekko.persistence.r2dbc.state"

    r2dbc {
      connection-factory {
        max-size = 200
        acquire-timeout = 15 seconds
        acquire-retry = 5
        max-idle-time = 30 seconds
        max-life-time = 5 minutes
        host = "localhost"
        host = ${?NEON_DB_HOST}
        port = 5432
        port = ${?NEON_DB_PORT}
        database = "neon_wes"
        database = ${?NEON_DB_NAME}
        user = "neon"
        user = ${?NEON_DB_USER}
        password = "neon"
        password = ${?NEON_DB_PASSWORD}
      }

      # Separate pool for projections to prevent polling from starving
      # persistence operations.
      projection-connection-factory = ${pekko.persistence.r2dbc.connection-factory} {
        max-size = 100
      }
    }
  }
}

pekko.projection.r2dbc {
  use-connection-factory = "pekko.persistence.r2dbc.projection-connection-factory"
}

neon {
  http {
    host = "0.0.0.0"
    host = ${?NEON_HTTP_HOST}
    port = 8080
    port = ${?NEON_HTTP_PORT}
  }

  auth {
    session-max-age = 30d
    session-renewal-threshold = 15d
    secure-cookies = true
    secure-cookies = ${?NEON_AUTH_SECURE_COOKIES}
  }
}
