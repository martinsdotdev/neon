services:
  postgres:
    image: postgres:17
    container_name: neon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neon_wes
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: neon
    ports:
      - "5432:5432"
    volumes:
      - neon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d neon_wes"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  neon-pgdata:
