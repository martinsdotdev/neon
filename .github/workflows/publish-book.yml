name: Publish book

# Renders the Laika book (docs/book) and deploys it to GitHub Pages.
# Replaces the old manual gh-pages branch: the site is now built from master
# on every change to the book sources, so the published HTML can no longer
# drift from the repository.

on:
  push:
    branches: [master]
    paths:
      - "docs/book/**"
      - "build.sbt"
      - "project/**"
      - ".github/workflows/publish-book.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Render the Laika site
        run: sbt laikaSite

      # First run flips Pages from the legacy gh-pages branch to GitHub Actions.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
